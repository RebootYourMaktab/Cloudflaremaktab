<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Progress Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f3f4f6; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .container { max-width: 500px; margin: 0 auto; }
    
    .app-header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
    .main-logo { max-width: 100px; height: auto; margin-bottom: 10px; border-radius: 12px; }
    .portal-tag { font-size: 12px; color: #4f46e5; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .app-header h1 { font-size: 24px; font-weight: 800; color: #111827; margin-top: 2px; }
    .student-subtitle { font-size: 16px; font-weight: 600; color: #4b5563; margin-top: 4px; }

    .task-card { background: white; border-radius: 16px; border: none; padding: 18px; margin-bottom: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    
    /* Vertical Category Cards with Integrated Progress Meters */
    .menu-item-card {
      background: white; padding: 18px; border-radius: 16px; margin-bottom: 14px;
      cursor: pointer; transition: all 0.2s; border: 1px solid #e5e7eb;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
    }
    .menu-item-card:active { transform: scale(0.98); }
    .menu-card-top-row { display: flex; justify-content: space-between; align-items: center; font-weight: 700; color: #1f2937; font-size: 17px; margin-bottom: 8px; }
    
    .menu-bar-track { width: 100%; height: 6px; background-color: #e5e7eb; border-radius: 20px; overflow: hidden; position: relative; }
    /* HIGHLIGHT COMPLETE PROGRESS FILL - BRIGHT GREEN */
    .menu-bar-fill { height: 100%; background-color: #22c55e; width: 0%; transition: width 0.3s ease; }
    .badge-percent { font-size: 12px; color: #6b7280; font-weight: 700; }

    /* Student Task Interaction Controls Alignment */
    .student-control-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 10px; }
    
    .btn-status-action {
      flex-grow: 1; padding: 10px; font-weight: 700; font-size: 14px; border-radius: 10px;
      border: 2px solid #22c55e; background-color: transparent; color: #15803d;
      transition: all 0.2s ease; cursor: pointer; text-align: center;
    }
    .btn-status-action.completed-active { background-color: #22c55e; color: white; }
    
    /* Read-Only Verification Badge Layout Specifications */
    .verify-indicator-box { display: flex; align-items: center; justify-content: center; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; min-width: 120px; text-align: center; }
    .verify-indicator-box.is-gold { background-color: #fffbeb; color: #b45309; border: 1px solid #fcd34d; }
    .verify-indicator-box.is-grey { background-color: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }
    
    .gold-tick { color: #d97706; font-weight: 900; margin-right: 5px; font-size: 15px; }
    .grey-dash { color: #94a3b8; font-weight: 900; margin-right: 5px; font-size: 15px; }

    .btn-exit-top { background-color: #111827; color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; margin-bottom: 20px; display: inline-block; }

    #loader { text-align: center; font-weight: bold; color: #4f46e5; padding: 30px; }
    #screen-categories, #screen-tasks { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div id="loader">Validating Access Credentials...</div>

  <div id="verification-screen" class="task-card text-center" style="display: none; margin-top: 15vh;">
    <img src="logo.png" class="main-logo" alt="Logo">
    <p class="portal-tag">Security Check</p>
    <h3 class="fw-bold mb-3">Identity Lock</h3>
    <input type="number" id="pin" class="form-control form-
