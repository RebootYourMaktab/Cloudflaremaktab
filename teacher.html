<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Management Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #0f172a;
      --accent-blue: #4f46e5;
      --bg-gray: #f3f4f6;
    }

    body { background-color: var(--bg-gray); font-family: -apple-system, sans-serif; padding: 20px; }
    .container-custom { max-width: 100%; width: 100%; margin: 0 auto; padding: 0 10px; }
    .container-fixed { max-width: 550px; margin: 0 auto; }
    
    .app-header { text-align: center; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
    .main-logo { max-width: 120px; height: auto; margin-bottom: 15px; border-radius: 12px; }
    .portal-tag { font-size: 14px; color: var(--accent-blue); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .app-header h1 { font-size: 24px; font-weight: 800; color: #111827; margin-top: 4px; }
    
    .menu-item-card {
      background: white; padding: 18px; border-radius: 16px; margin-bottom: 14px;
      cursor: pointer; transition: all 0.2s; border: 1px solid #e5e7eb;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
    }
    .menu-item-card:active { transform: scale(0.98); }
    .menu-card-top-row { display: flex; justify-content: space-between; align-items: center; font-weight: 700; color: #1f2937; font-size: 17px; margin-bottom: 8px; }
    
    .menu-bar-track { width: 100%; height: 6px; background-color: #e5e7eb; border-radius: 20px; overflow: hidden; position: relative; }
    .menu-bar-fill { height: 100%; background-color: #22c55e; width: 0%; transition: width 0.3s ease; }
    .badge-percent { font-size: 12px; color: #6b7280; font-weight: 700; }

    .group-section-title { font-size: 18px; font-weight: 800; color: #4b5563; margin: 25px 0 12px 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .purple-group-title { color: var(--accent-blue) !important; }

    .student-card { background: white; border-radius: 20px; border: none; padding: 20px; margin-bottom: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .student-name { font-size: 17px; font-weight: 700; color: #111827; margin-bottom: 14px; display: block; }
    
    .control-row { display: flex; gap: 10px; }
    .btn-action {
      flex: 1; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 700;
      border: 2px solid transparent; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .btn-status-toggle { border-color: #22c55e; background-color: transparent; color: #15803d; }
    .btn-status-toggle.active { background-color: #22c55e; color: white; }
    .btn-verify-toggle { border-color: #d97706; background-color: transparent; color: #b45309; }
    .btn-verify-toggle.active { background-color: #ffb703; border-color:#d97706; color: #111827; }

    .btn-exit-top { background-color: #111827; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; font-size: 14px; margin-bottom: 20px; display: inline-block; }
    .btn-toggle-view { background-color: #4f46e5; color: white; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; margin-bottom: 25px; }

    /* FIXED CONTAINER VIEWPORT CONFIGURATION FOR STICKY ELEMENT BOUNDS */
    .matrix-wrapper { 
      background: white; 
      padding: 0px 20px 20px 0px; 
      border-radius: 20px; 
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
      overflow: auto; 
      margin-top: 15px; 
      max-height: 70vh; 
      position: relative; /* Restricts sticky calculation scopes */
    }
    
    /* Strict assignment rules for native table alignment properties */
    .matrix-table { width: 100%; border-collapse: separate !important; border-spacing: 0; }
    .matrix-table th, .matrix-table td { padding: 12px 14px; text-align: center; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    
    /* LOCKED STICKY OVERHEAD TASK COLUMN TITLES */
    .matrix-table th { 
      background-color: #f8fafc !important; 
      font-weight: 800; 
      color: #475569; 
      font-size: 13px; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      border-bottom: 2px solid #e2e8f0; 
      position: sticky !important; 
      top: 0 !important; 
      z-index: 30 !important; /* Raised to always override scrolling body elements */
    }
    
    /* LOCKED STICKY FIXED LEFT FLUSH STUDENT NAMES */
    .matrix-student-cell { 
      text-align: left !important; 
      font-weight: 700; 
      color: #111827; 
      font-size: 15px; 
      min-width: 140px; 
      background-color: white !important; 
      position: sticky !important; 
      left: 0 !important; 
      box-shadow: 4px 0 8px -4px rgba(0,0,0,0.1); 
      z-index: 20 !important; /* Layers under row text but overrides side tracking boxes */
    }
    
    .th-task-header { min-width: 110px; max-width: 140px; font-size: 12px !important; white-space: normal; word-wrap: break-word; line-height: 1.2; }
    
    .grid-header-bar-track { width: 100%; height: 5px; background-color: #e2e8f0; border-radius: 10px; margin-top: 8px; overflow: hidden; }
    .grid-header-bar-fill { height: 100%; transition: width 0.3s ease; }
    
    .grid-interactive-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 6px; border-radius: 8px; background: #fafafa; }
    .grid-status-dot { width: 10px; height: 10px; border-radius: 50px; background: #cbd5e1; }
    .grid-status-dot.complete { background: #22c55e; }
    .custom-tick-input { width: 22px; height: 22px; cursor: pointer; accent-color: #d97706; }

    .matrix-group-divider td { background-color: #f1f5f9 !important; padding: 8px 0 !important; border: none !important; }

    .glass-card { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); padding: 24px; margin-bottom: 16px; }
    #loading-state { text-align: center; padding: 40px; font-weight: bold; color: #4b5563; display: none; }
    #screen-teacher-login, #screen-categories, #screen-tasks, #screen-students, #screen-composite-matrix { display: none; }
  </style>
</head>
<body>

<div id="main-layout-container" class="container-fixed">
  
  <div id="loading-state">Contacting Google Web App Servers...</div>

  <div id="screen-teacher-login" style="display: block;">
    <div class="glass-card text-center" style="margin-top: 10vh;">
      <img src="logo.png" class="main-logo" alt="Logo">
      <p class="portal-tag">Admin Security Check</p>
      <h2 class="fw-bold mb-3">Teacher Access Lock</h2>
      <input type="number" id="teacher-pin-field" class="form-control form-control-lg text-center mb-4" placeholder="Enter PIN" style="letter-spacing: 6px; font-weight: bold;">
      <button class="btn btn-primary btn-lg w-100" onclick="handleTeacherLoginSubmit()" style="border-radius: 12px; background-color: var(--accent-blue); border: none; font-weight: bold;">Unlock Admin Console</button>
    </div>
  </div>

  <div id="screen-categories">
    <div class="app-header">
      <img src="logo.png" class="main-logo" alt="Logo">
      <p class="portal-tag">Maktab Progress Record</p>
      <h1>Categories</h1>
    </div>
    <div id="category-list-target"></div>
  </div>

  <div id="screen-tasks">
    <div class="app-header">
      <h1 id="active-category-title" style="font-size: 38px; font-weight: 800; margin-top: 10px;">Tasks</h1>
      <div class="d-flex gap-2">
        <button class="btn-exit-top" onclick="showCategoriesView()">← Back</button>
        <button class="btn-toggle-view" onclick="showCompositeMatrixView()">📋 Switch to Register View</button>
      </div>
    </div>
    <div id="task-list-target"></div>
  </div>

  <div id="screen-students">
    <div class="app-header">
      <p class="portal-tag">Task Registry</p>
      <h1 id="active-task-title" style="font-size: 26px; font-weight: 800; line-height: 1.2;">Students</h1>
      <button class="btn-exit-top" onclick="showTasksView(currentSelectedCategory)">← Back to Tasks</button>
    </div>
    <div id="student-groups-target"></div>
  </div>

  <div id="screen-composite-matrix">
    <div class="app-header">
      <h1 id="matrix-category-title" style="font-size: 34px; font-weight: 800; margin-top: 10px;">Register View</h1>
      <button class="btn-exit-top" onclick="showTasksView(currentSelectedCategory)">← Exit Register View</button>
    </div>
    <div class="matrix-wrapper">
      <table class="matrix-table">
        <thead id="matrix-thead-target"></thead>
        <tbody id="matrix-tbody-target"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYAG-s6jj--sNtwtN8b3qe87j8pudyMHoJ5yJlnGLTLcowLGg3uYSb-nx7QYwBDdIQ/exec";
  const authKey = new URLSearchParams(window.location.search).get("auth");
  
  let masterDatabaseRows = [];
  let currentSelectedCategory = "";
  let currentSelectedTask = "";

  if (!authKey) {
    document.getElementById("screen-teacher-login").style.display = "none";
    document.getElementById("loading-state").style.display = "block";
    document.getElementById("loading-state").innerHTML = "<span class='text-danger'>Unauthorized: Missing URL Token reference code.</span>";
  }

  function handleTeacherLoginSubmit() {
    const enteredPin = document.getElementById("teacher-pin-field").value;
    if (!enteredPin) return alert("Please type your Verification PIN.");

    document.getElementById("loading-state").style.display = "block";
    document.getElementById("screen-teacher-login").style.display = "none";

    fetch(`${SCRIPT_URL}?view=teacher&auth=${authKey}&pin=${enteredPin}`)
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          masterDatabaseRows = data.rows;
          document.getElementById("loading-state").style.display = "none";
          showCategoriesView();
        } else {
          document.getElementById("loading-state").style.display = "none";
          document.getElementById("screen-teacher-login").style.display = "block";
          alert(data.error || "Access Denied.");
        }
      })
      .catch(() => {
        document.getElementById("loading-state").style.display = "none";
        document.getElementById("screen-teacher-login").style.display = "block";
        alert("Server Connectivity Error.");
      });
  }

  function showCategoriesView() {
    adjustContainerWidth(false);
    hideAllScreens();
    document.getElementById("screen-categories").style.display = "block";
    const container = document.getElementById("category-list-target");
    container.innerHTML = "";

    const categories = [...new Set(masterDatabaseRows.map(row => row.category))];
    
    categories.forEach(cat => {
      const matches = masterDatabaseRows.filter(r => r.category === cat);
      const verifiedCount = matches.filter(r => r.isVerified).length;
      const percent = matches.length > 0 ? Math.round((verifiedCount / matches.length) * 100) : 0;

      const itemCard = document.createElement("div");
      itemCard.className = "item-card menu-item-card";
      itemCard.onclick = () => {
        currentSelectedCategory = cat;
        showTasksView(cat);
      };

      itemCard.innerHTML = `
        <div class="menu-card-top-row">
          <span>${cat}</span>
          <span class="badge-percent">${percent}% Verified</span>
        </div>
        <div class="menu-bar-track">
          <div class="menu-bar-fill" style="width: ${percent}%"></div>
        </div>`;
      container.appendChild(itemCard);
    });
  }

  function showTasksView(categoryName) {
    adjustContainerWidth(false);
    hideAllScreens();
    document.getElementById("screen-tasks").style.display = "block";
    document.getElementById("active-category-title").innerText = categoryName;
    
    const container = document.getElementById("task-list-target");
    container.innerHTML = "";

    const filteredTasks = [...new Set(masterDatabaseRows.filter(r => r.category === categoryName).map(r => r.taskName))];
    
    filteredTasks.forEach(task => {
      const matches = masterDatabaseRows.filter(r => r.category === categoryName && r.taskName === task);
      const completedCount = matches.filter(r => r.status === "Complete").length;
      const completionPercent = matches.length > 0 ? Math.round((completedCount / matches.length) * 100) : 0;

      const itemCard = document.createElement("div");
      itemCard.className = "item-card menu-item-card";
      itemCard.onclick = () => showStudentsView(task);

      itemCard.innerHTML = `
        <div class="menu-card-top-row">
          <span>${task}</span>
          <span class="badge-percent">${completionPercent}% Complete</span>
        </div>
        <div class="menu-bar-track">
          <div class="menu-bar-fill" style="width: ${completionPercent}%"></div>
        </div>`;
      container.appendChild(itemCard);
    });
  }

  function showStudentsView(taskName) {
    currentSelectedTask = taskName;
    adjustContainerWidth(false);
    hideAllScreens();
    document.getElementById("screen-students").style.display = "block";
    document.getElementById("active-task-title").innerText = taskName;

    const container = document.getElementById("student-groups-target");
    container.innerHTML = "";

    const matchedProgressRows = masterDatabaseRows.filter(r => r.category === currentSelectedCategory && r.taskName === taskName);
    const groups = {};
    
    matchedProgressRows.forEach(row => {
      const groupKey = row.groupName ? row.groupName.toString().trim() : "Unassigned Group";
      if (!groups[groupKey]) groups[groupKey] = [];
      groups[groupKey].push(row);
    });

    Object.keys(groups).sort().forEach(group => {
      const groupHeader = document.createElement("div");
      
      if (group === "Group 2" || group === "Group 4" || group === "2" || group === "4") {
        groupHeader.className = "group-section-title purple-group-title";
      } else {
        groupHeader.className = "group-section-title";
      }
      
      groupHeader.innerText = group;
      container.appendChild(groupHeader);

      groups[group].sort((a, b) => {
        const nameA = a.studentName ? a.studentName.toString() : "";
        const nameB = b.studentName ? b.studentName.toString() : "";
        return nameA.localeCompare(nameB);
      });

      groups[group].forEach(studentTask => {
        const card = document.createElement("div");
        card.className = "student-card";
        
        const isComplete = studentTask.status === "Complete";
        const statusClass = isComplete ? "active" : "";
        const statusLabel = isComplete ? "✓ Complete" : "Not Started";

        const verClass = studentTask.isVerified ? "active" : "";
        const verLabel = studentTask.isVerified ? "★ Verified" : "Unverified";

        card.innerHTML = `
          <span class="student-name">${studentTask.studentName || 'Unknown Student'}</span>
          <div class="control-row">
            <button id="status-btn-${studentTask.row}" class="btn-action btn-status-toggle ${statusClass}" onclick="toggleTeacherStudentStatus(${studentTask.row})">
              ${statusLabel}
            </button>
            <button id="verify-btn-${studentTask.row}" class="btn-action btn-verify-toggle ${verClass}" onclick="toggleTeacherStudentVerification(${studentTask.row})">
              ${verLabel}
            </button>
          </div>`;
        container.appendChild(card);
      });
    });
    window.scrollTo(0,0);
  }

  function showCompositeMatrixView() {
    adjustContainerWidth(true); 
    hideAllScreens();
    document.getElementById("screen-composite-matrix").style.display = "block";
    document.getElementById("matrix-category-title").innerText = currentSelectedCategory;

    const thead = document.getElementById("matrix-thead-target");
    const tbody = document.getElementById("matrix-tbody-target");
    thead.innerHTML = "";
    tbody.innerHTML = "";

    const categoryRows = masterDatabaseRows.filter(r => r.category === currentSelectedCategory);
    const distinctTasks = [...new Set(categoryRows.map(r => r.taskName))];
    
    const studentUniqueMap = [];
    const trackingKeys = new Set();

    categoryRows.forEach(r => {
      const sName = r.studentName ? r.studentName.toString().trim() : "Unknown Student";
      if(!trackingKeys.has(sName)) {
        trackingKeys.add(sName);
        studentUniqueMap.push({
          name: sName,
          group: r.groupName ? r.groupName.toString().trim() : "Unassigned Group"
        });
      }
    });

    studentUniqueMap.sort((a, b) => {
      const compGroup = a.group.localeCompare(b.group);
      if (compGroup !== 0) return compGroup;
      return a.name.localeCompare(b.name);
    });

    const headerRow = document.createElement("tr");
    headerRow.innerHTML = `<th class="text-start" style="position: sticky !important; left: 0 !important; top: 0 !important; background-color: #f8fafc !important; z-index: 40 !important;">Student Name</th>`;
    
    distinctTasks.forEach(task => {
      const taskMatches = categoryRows.filter(r => r.taskName === task);
      const totalActiveStudents = taskMatches.length;
      const totalCompleted = taskMatches.filter(r => r.status === "Complete").length;
      
      const percentage = totalActiveStudents > 0 ? Math.round((totalCompleted / totalActiveStudents) * 100) : 0;
      const barColor = (percentage === 100) ? "#15803d" : "#22c55e";

      headerRow.innerHTML += `
        <th class="th-task-header">
          <div>${task}</div>
          <div class="grid-header-bar-track">
            <div class="grid-header-bar-fill" style="width: ${percentage}%; background-color: ${barColor};"></div>
          </div>
        </th>`;
    });
    thead.appendChild(headerRow);

    let lastRenderedGroup = null;

    studentUniqueMap.forEach((studentObj) => {
      if (lastRenderedGroup !== null && lastRenderedGroup !== studentObj.group) {
        const spacerRow = document.createElement("tr");
        spacerRow.className = "matrix-group-divider";
        spacerRow.innerHTML = `<td colspan="${distinctTasks.length + 1}"></td>`;
        tbody.appendChild(spacerRow);
      }
      lastRenderedGroup = studentObj.group;

      const rowItem = document.createElement("tr");
      rowItem.innerHTML = `<td class="matrix-student-cell">${studentObj.name}</td>`;
      
      distinctTasks.forEach(task => {
        const record = categoryRows.find(r => r.studentName === studentObj.name && r.taskName === task);
        if (record) {
          const isComplete = record.status === "Complete" ? "complete" : "";
          const isChecked = record.isVerified ? "checked" : "";
          
          rowItem.innerHTML += `
            <td>
              <div class="grid-interactive-cell" onclick="toggleMatrixCellRowComplete(${record.row}, this, event)">
                <div class="grid-status-dot ${isComplete}" title="Status: ${record.status}"></div>
                <input type="checkbox" class="custom-tick-input" ${isChecked} 
                  onchange="toggleGridMatrixVerification(this, ${record.row})">
              </div>
            </td>`;
        } else {
          rowItem.innerHTML += `<td><span class="text-muted">-</span></td>`;
        }
      });
      tbody.appendChild(rowItem);
    });
    window.scrollTo(0,0);
  }

  function toggleMatrixCellRowComplete(rowId, cellDivElement, event) {
    if(event.target.tagName === "INPUT") return;
    
    const idx = masterDatabaseRows.findIndex(r => r.row === rowId);
    if (idx === -1) return;

    const currentStatus = masterDatabaseRows[idx].status;
    const newStatus = currentStatus === "Complete" ? "Not Started" : "Complete";
    masterDatabaseRows[idx].status = newStatus;

    const dot = cellDivElement.querySelector(".grid-status-dot");
    dot.classList.toggle("complete", newStatus === "Complete");

    recalculateLiveHeaderProgressMeters();
    executeTeacherDatabaseSave(idx);
  }

  function toggleGridMatrixVerification(checkboxElement, rowId) {
    const idx = masterDatabaseRows.findIndex(r => r.row === rowId);
    if (idx === -1) return;

    masterDatabaseRows[idx].isVerified = checkboxElement.checked;
    executeTeacherDatabaseSave(idx);
  }

  function recalculateLiveHeaderProgressMeters() {
    const categoryRows = masterDatabaseRows.filter(r => r.category === currentSelectedCategory);
    const distinctTasks = [...new Set(categoryRows.map(r => r.taskName))];
    const thElements = document.querySelectorAll("#matrix-thead-target th:not(.text-start)");

    distinctTasks.forEach((task, index) => {
      if(thElements[index]) {
        const taskMatches = categoryRows.filter(r => r.taskName === task);
        const totalCompleted = taskMatches.filter(r => r.status === "Complete").length;
        const percentage = taskMatches.length > 0 ? Math.round((totalCompleted / taskMatches.length) * 100) : 0;
        
        const fillBar = thElements[index].querySelector(".grid-header-bar-fill");
        if(fillBar) {
          fillBar.style.width = percentage + "%";
          fillBar.style.backgroundColor = (percentage === 100) ? "#15803d" : "#22c55e";
        }
      }
    });
  }

  function toggleTeacherStudentStatus(rowId) {
    const idx = masterDatabaseRows.findIndex(r => r.row === rowId);
    if (idx === -1) return;
    
    const currentStatus = masterDatabaseRows[idx].status;
    const nextStatus = currentStatus === "Complete" ? "Not Started" : "Complete";
    masterDatabaseRows[idx].status = nextStatus;
    
    const btn = document.getElementById(`status-btn-${rowId}`);
    btn.classList.toggle("active", nextStatus === "Complete");
    btn.innerText = nextStatus === "Complete" ? "✓ Complete" : "Not Started";
    
    executeTeacherDatabaseSave(idx);
  }

  function toggleTeacherStudentVerification(rowId) {
    const idx = masterDatabaseRows.findIndex(r => r.row === rowId);
    if (idx === -1) return;
    
    const nextVerifyState = !masterDatabaseRows[idx].isVerified;
    masterDatabaseRows[idx].isVerified = nextVerifyState;
    
    const btn = document.getElementById(`verify-btn-${rowId}`);
    btn.classList.toggle("active", nextVerifyState);
    btn.innerText = nextVerifyState ? "★ Verified" : "Unverified";
    
    executeTeacherDatabaseSave(idx);
  }

  function executeTeacherDatabaseSave(cacheIndex) {
    const dataItem = masterDatabaseRows[cacheIndex];
    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        action: "teacherUpdate",
        row: dataItem.row,
        status: dataItem.status,
        verified: dataItem.isVerified
      })
    });
  }

  function adjustContainerWidth(isExpandedMatrixView) {
    const layout = document.getElementById("main-layout-container");
    layout.className = isExpandedMatrixView ? "container-custom" : "container-fixed";
  }

  function hideAllScreens() {
    document.getElementById("loading-state").style.display = "none";
    document.getElementById("screen-teacher-login").style.display = "none";
    document.getElementById("screen-categories").style.display = "none";
    document.getElementById("screen-tasks").style.display = "none";
    document.getElementById("screen-students").style.display = "none";
    document.getElementById("screen-composite-matrix").style.display = "none";
  }
</script>
</body>
</html>
