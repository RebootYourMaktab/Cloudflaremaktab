<!DOCTYPE html>
<html>
<head>
  <title>Maktab Admin Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-color: #1B211A;
      --dark-accent: #628141;
      --medium-accent: #8BAE66;
      --text-light: #EBD5AB;
    }
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/gagalin" rel="stylesheet">

    /* Fixed missing semicolons in background-color/color */
style>
    body { background-color: var(--bg-color); color: var(--medium-accent); font-family: sans serif display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    h1, h2, h3, h4 { color: var(--medium-accent); font-family: 'GAGALIN', cursive; letter-spacing: 1px; font-weight: normal; margin-top: 0;}
    .screen { background-color: var(--text-ligh); padding: 20px; border-radius: 10px; box-shadow: 0 4px 12px rgba(128, 0, 0, 0.15); text-align: center; width: 100%; max-width: 400px; }
    #dashboard-screen, #task-screen { display: none; width: 100%; max-width: 600px; }
   .app-logo { 
      width: 140px; 
      height: auto; 
      margin-bottom: 15px; 
      border-radius: 12px; 
      box-shadow: 0 4px 8px rgba(128, 0, 0, 0.2); 
    }
    input { padding: 12px; margin: 10px 0 20px 0; border-radius: 5px; border: 1px solid var(--medium-accent); width: 85%; font-size: 1rem; color: var(--medium-accent); }
    button { background-color: var(--bg-color); color: var(--medium-accent); border: 3px solid maroon; border-radius: 12px; font-size: 1.1rem; font-family: 'Gagalin', sans-serif; letter-spacing: 1px; cursor: pointer; padding: 10px 20px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); user-select: none; margin: 5px; }
    button:active { background-color: var(--medium-accent); color: var(--bg-color); transform: scale(0.95); }
    .login-btn { width: 90%; padding: 12px; }
    .save-exit-btn { background-color: var(--medium-accent); color: var(--bg-color); padding: 10px 20px; font-size: 1.2rem; margin-top: 20px; }
    
    .exit-app-btn { background-color: var(--medium-accent); var(--bg-color);  padding: 10px 20px; font-size: 1.1rem; margin-top: 30px; }
    
    .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
    .category-btn { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px 10px; height: 100%; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; background-color: white; }
    th, td { padding: 10px 5px; border-bottom: 2px solid rgba(128,0,0,0.1); font-size: 0.9rem;}
    th { font-family: 'Gagalin', sans-serif; color: maroon; text-align: center; }
    .status-toggle { cursor: pointer; }
    .forest-tick { color: forestgreen; font-size: 1.5rem; }
    .maroon-tick { color: var(--medium-accent); font-size: 1.5rem; }
    .gray-cloud { background-color: #f0f0f0; color: #777; font-size: 0.7rem; padding: 3px 6px; border-radius: 10px; }
    .progress-container { width: 100%; background-color: rgba(128, 0, 0, 0.1); border-radius: 5px; height: 8px; margin-top: 8px; overflow: hidden; }
    .progress-fill { background-color: limegreen; height: 100%; transition: width 0.3s ease; }
    
    #task-progress-wrapper { height: 12px; margin-bottom: 15px; }

    /* NEW: Audio Button Styling */
    .audio-btn { background-color: #3498db; color: white; border: 2px solid #2980b9; padding: 4px 8px; font-size: 0.7rem; border-radius: 5px; margin-top: 8px; margin-left: 0; display: inline-block; font-family: sans-serif; letter-spacing: 0; }
    .audio-btn:active { background-color: #2980b9; transform: scale(0.95); }
    .audio-playing { background-color: #e67e22; border-color: #d35400; } /* Turns Orange when playing */

    .quote-box { 
      margin-top: 30px; 
      margin-bottom: 20px; 
      font-size: 1rem; /* Fixed: Removed the dot before rem */
      font-family: 'Comic Sans MS';
      font-style: normal;
      color: maroon; /* Fixed: Changed from HTML inline style to proper CSS property */
      line-height: 1.4; 
      padding: 20px 10px 20px 10px; /* Fixed: Combined your padding rules (Top, Right, Bottom, Left) */
      min-height: 40px;
      border: 1px dashed maroon; /* Added the missing semicolon at the end */
      border-radius: 12px; 
    }

    
    h1, h2, h3, h4 { color: var(--medium-accent); font-family: 'GAGALIN', cursive; letter-spacing: 1px; font-weight: normal; margin-top: 0;}
    .screen { background-color: #34495e; padding: 30px; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 400px; }
    #admin-dashboard { display: none; max-width: 800px; }
    h2 { color: #ecf0f1; margin-bottom: 20px; }
    
    input { padding: 12px; margin: 10px 0 20px 0; border-radius: 5px; border: none; width: 85%; font-size: 1rem; text-align: center; }
    button { background-color: maroon; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; padding: 12px 20px; width: 95%; font-weight: bold; }
    button:active { transform: scale(0.98); }
    
    /* Display area for dashboard data */
    #dashboard-content {
      margin-top: 20px;
      text-align: left;
      background: var(--bg-color);
      padding: 15px;
      border-radius: 8px;
    }
    .student-item {
      padding: 8px;
      border-bottom: 1px solid var(--text-light);
    }
  </style>
</head>
<body>

  <div id="admin-login-screen" class="screen">
    <h2>Teacher Portal</h2>
    <input type="password" id="adminPin" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Enter 4-Digit PIN">
    <button onclick="attemptAdminLogin()">Log In to Dashboard</button>
    <p id="error-message" style="color: #e74c3c; font-weight: bold; margin-top: 15px;"></p>
  </div>

  <div id="admin-dashboard" class="screen">
    <h2>Teacher Dashboard</h2>
    <p id="admin-welcome-text" style="font-size: 1.2rem; font-weight: bold; color: #ecf0f1;"></p>
    
    <div id="dashboard-content"></div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTSI8edGh-riqutqrOci9d66hKos8a7kcB7VDw6FsUhZw91C4IvHOlKvR47Vr_DHqK/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('token'); 

    // Global variable fixed so updateTaskProgressBar doesn't throw an error
    let currentTasksList = [];

    function attemptAdminLogin() {
      const pin = document.getElementById('adminPin').value;
      const errorMsg = document.getElementById('error-message');
      errorMsg.innerText = "Verifying...";
      
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ 
          action: 'adminLogin', 
          pin: pin, 
          token: urlToken 
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById('admin-login-screen').style.display = 'none';
          document.getElementById('admin-dashboard').style.display = 'block';
          
          const teacherName = data.adminData ? data.adminData.name : "Teacher";
          document.getElementById('admin-welcome-text').innerText = "Welcome, " + teacherName + "!";
          
          // FIX ADDED: Fetch the data now that login is successful!
          fetchDashboardData();
          
        } else { 
          errorMsg.innerText = data.message || "Invalid Admin PIN."; 
        }
      })
      .catch(err => {
        errorMsg.innerText = "Network Error.";
      });
    }

    // NEW FUNCTION: Actually pull the Dashboard Data
    function fetchDashboardData() {
      const contentDiv = document.getElementById('dashboard-content');
      contentDiv.innerHTML = "<p>Loading dashboard data...</p>";

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getAdminDashboardData' })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          // Build the UI with the data returned from Apps Script
          let html = `<h3>Maktab Progress: <span style="color: limegreen;">${data.maktabProgress}%</span></h3>`;
          
          html += `<h4>Students:</h4>`;
          if(data.students && data.students.length > 0) {
            data.students.forEach(student => {
              html += `<div class="student-item">
                         <strong>${student.name}</strong> (PIN: ${student.pin})
                       </div>`;
            });
          } else {
            html += `<p>No students found.</p>`;
          }
          
          contentDiv.innerHTML = html;
        } else {
          contentDiv.innerHTML = `<p style="color: #e74c3c;">Failed to load data: ${data.message}</p>`;
        }
      })
      .catch(err => {
        contentDiv.innerHTML = `<p style="color: #e74c3c;">Error loading data.</p>`;
      });
    }

    function updateTaskProgressBar() {
      if (!currentTasksList || currentTasksList.length === 0) return;
      
      const verifiedCount = currentTasksList.filter(t => t.verification === "Verified").length;
      const percent = Math.round((verifiedCount / currentTasksList.length) * 100);
      
      const progressFill = document.getElementById('task-progress-fill');
      if(progressFill) {
         progressFill.style.width = percent + '%';
      }
    }
  </script>
</body>
</html>
