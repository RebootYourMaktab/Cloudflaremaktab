<!DOCTYPE html>
<html>
<head>
    <title>Maktab Admin Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/gagalin" rel="stylesheet">


  <style>
    body { background-color: blanchedalmond; color: teal; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    h1, h2, h3, h4 { color: teal; font-family: 'GAGALIN', cursive; letter-spacing: 1px; font-weight: normal; margin-top: 0;}
    .screen { background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 12px rgba(128, 0, 0, 0.15); text-align: center; width: 100%; max-width: 400px; }
    #dashboard-screen, #task-screen { display: none; width: 100%; max-width: 600px; }
   .app-logo { 
      width: 140px; 
      height: auto; 
      margin-bottom: 15px; 
      border-radius: 12px; 
      box-shadow: 0 4px 8px rgba(128, 0, 0, 0.2); 
    }
    input { padding: 12px; margin: 10px 0 20px 0; border-radius: 5px; border: 1px solid teal; width: 85%; font-size: 1rem; color: teal; }
    button { background-color: blanchedalmond; color: teal; border: 3px solid teal; border-radius: 12px; font-size: 1.1rem; font-family: 'Gagalin', sans-serif; letter-spacing: 1px; cursor: pointer; padding: 10px 20px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); user-select: none; margin: 5px; }
    button:active { background-color: teal; color: blanchedalmond; transform: scale(0.95); }
    .login-btn { width: 90%; padding: 12px; }
    .save-exit-btn { background-color: teal; color: blanchedalmond; padding: 10px 20px; font-size: 1.2rem; margin-top: 20px; }
    
    .exit-app-btn { background-color: teal; color: blanchedalmond;  padding: 10px 20px; font-size: 1.1rem; margin-top: 30px; }
    
    .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
    .category-btn { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px 10px; height: 100%; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; background-color: white; }
    th, td { padding: 10px 5px; border-bottom: 2px solid rgba(128,0,0,0.1); font-size: 0.9rem;}
    th { font-family: 'Gagalin', sans-serif; color: teal; text-align: center; }
    .status-toggle { cursor: pointer; }
    .forest-tick { color: forestgreen; font-size: 1.5rem; }
    .teal-tick { color: teal; font-size: 1.5rem; }
    .gray-cloud { background-color: #f0f0f0; color: #777; font-size: 0.7rem; padding: 3px 6px; border-radius: 10px; }
    .progress-container { width: 100%; background-color: rgba(128, 0, 0, 0.1); border-radius: 5px; height: 8px; margin-top: 8px; overflow: hidden; }
    .progress-fill { background-color: limegreen; height: 100%; transition: width 0.4s ease; }
    #task-progress-wrapper { height: 12px; margin-bottom: 15px; }

      /* Add these to your existing <style> block */
    .dashboard-section { background-color: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left; border: 1px solid rgba(0,128,128, 0.2); }
    .dashboard-section h3 { margin-bottom: 10px; border-bottom: 2px solid teal; padding-bottom: 5px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; }
    .progress-track { flex-grow: 1; background-color: #ddd; height: 10px; border-radius: 5px; margin: 0 10px; overflow: hidden; }
    select { padding: 10px; margin-bottom: 15px; width: 100%; border: 2px solid teal; border-radius: 5px; font-family: sans-serif; font-size: 1rem; color: teal; outline: none; }
    .sub-stat { font-size: 0.8rem; color: #555; padding-left: 10px; }

    /* NEW: Audio Button Styling */
    .audio-btn { background-color: #3498db; color: white; border: 2px solid #2980b9; padding: 4px 8px; font-size: 0.7rem; border-radius: 5px; margin-top: 8px; margin-left: 0; display: inline-block; font-family: sans-serif; letter-spacing: 0; }
    .audio-btn:active { background-color: #2980b9; transform: scale(0.95); }
    .audio-playing { background-color: #e67e22; border-color: #d35400; } /* Turns Orange when playing */

    .quote-box { 
      margin-top: 30px; 
      margin-bottom: 20px; 
      font-size: 1rem; /* Fixed: Removed the dot before rem */
      font-family: 'Comic Sans MS';
      font-style: normal;
      color: teal; /* Fixed: Changed from HTML inline style to proper CSS property */
      line-height: 1.4; 
      padding: 20px 10px 20px 10px; /* Fixed: Combined your padding rules (Top, Right, Bottom, Left) */
      min-height: 40px;
      border: 1px dashed teal; /* Added the missing semicolon at the end */
      border-radius: 12px; 
    }

    @media (min-width: 600px) { .button-grid { grid-template-columns: repeat(4, 1fr); } }
  </style>
</head>
<body>

  <div id="login-screen" class="screen">
    <img src="logo.png" alt="Maktab Logo" class="app-logo">
    <h2>ADMIN PORTAL</h2>
    <input type="password" id="adminPin" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Enter 4-Digit PIN">
    <button onclick="verifyAdminLogin()">Log In to Dashboard</button>
    <br>
    <div id="quote-box" class="quote-box" >......</div>
    <p id="error-message" style="color: red; font-weight: bold;"></p>
  </div>

  <div id="admin-dashboard" class="screen">
    <div id="welcome-message"></div>
    
    <div class="dashboard-section" id="class-section">
      <h3>Overall Class Progress</h3>
      <div id="class-stats-container">Loading...</div>
    </div>

    <div class="dashboard-section" id="group-section">
      <h3>Group Progress</h3>
      <select id="group-selector" onchange="renderGroupStats()">
        <option value="">Select a Group...</option>
      </select>
      <div id="group-stats-container"></div>
    </div>

    <div class="dashboard-section" id="student-section">
      <h3>Student Progress</h3>
      <select id="student-selector" onchange="renderStudentStats()">
        <option value="">Select a Student...</option>
      </select>
      <div id="student-stats-container"></div>
    </div>

    <button class="exit-app-btn" onclick="location.reload()">Exit Dashboard</button>
  </div>



  <script>
    // --- CONFIGURE YOUR URL HERE ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTSI8edGh-riqutqrOci9d66hKos8a7kcB7VDw6FsUhZw91C4IvHOlKvR47Vr_DHqK/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('token'); 

    let adminPin = "";
    
    function apiCall(payload) {
      return fetch(SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow', 
        headers: {
          'Content-Type': 'text/plain;charset=utf-8' 
        },
        body: JSON.stringify(payload)
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.json();
      });
    }

    // Fetch Quote in the background
    window.onload = function() {
        apiCall({ action: 'getQuote' })
        .then(data => {
            if (data && data.success && data.quote) {
                document.getElementById('quote-box').innerText = '"' + data.quote + '"';
            } else {
                document.getElementById('quote-box').innerText = '"Messenger of Allah (ﷺ) said: "Whoever takes a path upon which to obtain knowledge, Allah makes the path to Paradise easy for him""';
            }
        })
        .catch(err => {
            document.getElementById('quote-box').innerText = '"Messenger of Allah (ﷺ) said: "Whoever takes a path upon which to obtain knowledge, Allah makes the path to Paradise easy for him""'; 
        });
    };

    function verifyAdminLogin() {
      const pin = document.getElementById('adminPin').value;
      
      // Clear previous errors
      document.getElementById('error-message').innerText = "";

      // FIX: Changed action to 'adminLogin'
      apiCall({ action: 'adminLogin', pin: pin, token: urlToken })
      .then(data => {
        if (data.success) {
          adminPin = pin;
          
          // FIX: Matched the HTML ID for the dashboard
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('admin-dashboard').style.display = 'block';
          
          document.getElementById('welcome-message').innerHTML = `
            <h1>${data.adminData.name}</h1>
            <h2 style="margin-bottom: 5px">* Ahlan wa sahlan *</h2>
          `;
          
          // Next step: Load the Admin Dashboard Data
          loadDashboardData();
          
        } else {
           // Show error if login fails
           document.getElementById('error-message').innerText = data.message || "Invalid Token or PIN.";
        }
      })
      .catch(err => {
         document.getElementById('error-message').innerText = "Connection error. Please try again.";
      });
    }

    // Function to fetch the dashboard data (maktabProgress and students)
    function loadDashboardData() {
       apiCall({ action: 'getAdminDashboardData' })
       .then(data => {
           if (data.success) {
               console.log("Dashboard loaded successfully:", data);
               // TODO: Render the data.students array and data.maktabProgress here
               // Waiting for your explanation to build this part!
           } else {
               alert("Failed to load dashboard data: " + data.message);
           }
       });
    }
      // --- ADD THIS TO YOUR SCRIPT TAG ---
    let globalDashboardData = null; // Store data globally to easily swap views

    // Function to calculate percentage safely
    function getCalcPercent(verified, total) {
      return total === 0 ? 0 : Math.round((verified / total) * 100);
    }

    // Generate HTML for a progress bar row
    function createProgressBarHTML(label, verified, total) {
      const percent = getCalcPercent(verified, total);
      return `
        <div class="stat-row">
          <span style="width: 30%;">${label}</span>
          <div class="progress-track">
            <div class="progress-fill" style="width: ${percent}%"></div>
          </div>
          <span style="width: 15%; text-align: right;">${percent}%</span>
        </div>
      `;
    }

    function loadDashboardData() {
       apiCall({ action: 'getAdminDashboardData' })
       .then(data => {
           if (data.success) {
               globalDashboardData = data;
               
               // 1. Render Class Data
               const classData = data.classStats;
               document.getElementById('class-stats-container').innerHTML = 
                 createProgressBarHTML("Total Verification", classData.verified, classData.total);

               // 2. Populate Dropdowns
               populateDropdowns();

           } else {
               alert("Failed to load dashboard data: " + data.message);
           }
       });
    }

    function populateDropdowns() {
      const groupSelect = document.getElementById('group-selector');
      const studentSelect = document.getElementById('student-selector');
      
      // Populate Groups
      Object.keys(globalDashboardData.groupStats).sort().forEach(group => {
        const opt = document.createElement('option');
        opt.value = group;
        opt.innerText = `Group ${group}`;
        groupSelect.appendChild(opt);
      });

      // Populate Students (Alphabetically)
      const students = Object.values(globalDashboardData.students).sort((a, b) => a.name.localeCompare(b.name));
      students.forEach(student => {
        const opt = document.createElement('option');
        opt.value = student.pin;
        opt.innerText = `${student.name} (Grp ${student.group})`;
        studentSelect.appendChild(opt);
      });
    }

    function renderGroupStats() {
      const group = document.getElementById('group-selector').value;
      const container = document.getElementById('group-stats-container');
      
      if (!group) { container.innerHTML = ""; return; }

      const gData = globalDashboardData.groupStats[group];
      let html = createProgressBarHTML("Overall Group", gData.verified, gData.total);
      
      html += `<div style="margin-top:10px; color:teal; font-family: 'Gagalin';">By Category</div>`;
      for (const [catName, stats] of Object.entries(gData.categories)) {
        html += createProgressBarHTML(catName, stats.verified, stats.total);
      }

      // If you want Tasks too, uncomment below (it can get long!)
      /*
      html += `<div style="margin-top:10px; color:teal; font-family: 'Gagalin';">By Task</div>`;
      for (const [taskName, stats] of Object.entries(gData.tasks)) {
        html += `<div class="sub-stat">${createProgressBarHTML(taskName, stats.verified, stats.total)}</div>`;
      }
      */
      
      container.innerHTML = html;
    }

    function renderStudentStats() {
      const pin = document.getElementById('student-selector').value;
      const container = document.getElementById('student-stats-container');
      
      if (!pin) { container.innerHTML = ""; return; }

      const sData = globalDashboardData.students[pin];
      let html = createProgressBarHTML("Overall Progress", sData.verified, sData.total);
      
      html += `<div style="margin-top:10px; color:teal; font-family: 'Gagalin';">By Category</div>`;
      for (const [catName, stats] of Object.entries(sData.categories)) {
        html += createProgressBarHTML(catName, stats.verified, stats.total);
      }
      
      container.innerHTML = html;
    }
  </script>
</body>
</html>
